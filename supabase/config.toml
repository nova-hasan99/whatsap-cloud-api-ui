# Supabase project configuration. Edit project_id to match your linked project.
project_id = "whatsapp-business-platform"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = false

[storage]
enabled = true
file_size_limit = "50MiB"

[functions.whatsapp-webhook]
verify_jwt = false

[functions.send-message]
verify_jwt = false

[functions.send-template]
verify_jwt = false

[functions.mark-read]
verify_jwt = false

[functions.fetch-templates]
verify_jwt = false

[functions.test-connection]
verify_jwt = false

[functions.upload-media]
verify_jwt = false

[functions.log-message]
verify_jwt = false

[functions.update-profile]
verify_jwt = false

[functions.delete-message]
verify_jwt = false

[functions.create-conversation]
verify_jwt = false

[functions.delete-conversation]
verify_jwt = false
